name: Update NextNews

on:
  schedule:
    - cron: "0 */1 * * *" # roda a cada hora
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - run: npm install node-fetch
      - run: node bot/fetchNews.js
      - name: Commit changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit -m "Atualização automática de notícias" || echo "Sem alterações"
          git push
